name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev

      - name: Cache Emscripten SDK
        uses: actions/cache@v4
        with:
          path: /opt/emsdk
          key: emsdk-3.1.50

      - name: Install Emscripten SDK
        run: |
          if [ ! -d /opt/emsdk ]; then
            git clone https://github.com/emscripten-core/emsdk.git /opt/emsdk
            /opt/emsdk/emsdk install 3.1.50
            /opt/emsdk/emsdk activate 3.1.50
          fi

      - name: Build WASM
        run: ./scripts/build_wasm.sh

      - name: Upload WASM artifact for local testing
        uses: actions/upload-artifact@v4
        with:
          name: orbitforge-wasm
          path: |
            web/public/orbitforge.js
            web/public/orbitforge.wasm
            web/public/orbitforge.worker.js
          retention-days: 14

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npm run build
        working-directory: web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: orbitforge
          directory: web/dist
