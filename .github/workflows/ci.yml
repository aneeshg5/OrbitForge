name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  engine-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libeigen3-dev

      - name: Build (Debug + ASan + UBSan)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug engine/
          cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure

      - name: Build (TSan)
        run: |
          cmake -B build_tsan -DCMAKE_BUILD_TYPE=Debug -DENABLE_TSAN=ON engine/
          cmake --build build_tsan -j$(nproc)

      - name: Test (TSan)
        run: cd build_tsan && ctest --output-on-failure

  web-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx tsc --noEmit
        working-directory: web

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # web/public/orbitforge.{wasm,js,worker.js} are gitignored build
      # outputs (deploy.yml's job builds them, but that's a separate
      # workflow run with no shared filesystem) — without building them
      # here too, the dev server Playwright drives has no WASM to serve,
      # every fetch for them 404s as an HTML page, and any test exercising
      # the actual simulation fails with a generic "Unexpected token '<'"
      # page error instead of a useful one. Same Emscripten setup as
      # deploy.yml's build-and-deploy job.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev

      - name: Cache Emscripten SDK
        uses: actions/cache@v4
        with:
          path: /opt/emsdk
          key: emsdk-3.1.50

      - name: Install Emscripten SDK
        run: |
          if [ ! -d /opt/emsdk ]; then
            git clone https://github.com/emscripten-core/emsdk.git /opt/emsdk
            /opt/emsdk/emsdk install 3.1.50
            /opt/emsdk/emsdk activate 3.1.50
          fi

      - name: Build WASM
        run: ./scripts/build_wasm.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx playwright install --with-deps chromium
        working-directory: web
      - run: npm run test:e2e
        working-directory: web
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: web/test-results/
          retention-days: 7
