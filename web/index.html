<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrbitForge — Live Spacecraft State Estimation</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060810;
      --surface: #0c0f1a;
      --surface-2: #111626;
      --border: #232a40;
      --border-strong: #323a56;
      --text: #e8ebf3;
      --text-muted: #8891a8;
      --text-faint: #5b6378;

      --accent-blue: #5b8cff;   /* KF */
      --accent-teal: #2dd9c4;   /* EKF */
      --accent-orange: #f7a93e; /* UKF */
      --accent-primary: #3b82f6;
      --accent-danger: #ef5a6f;
      --accent-green: #3ddc84;

      --font-ui: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'Fira Code', 'SF Mono', monospace;

      --radius: 8px;
      --transition: 160ms ease-out;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
    }

    #app { display: flex; flex-direction: column; height: 100%; }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }
    /* Elapsed simulated time (not wall-clock) — lets the user tell when
       to pause after simulating a given duration. Sourced from the
       engine's own sim_time (StateFrame), so it reflects sim_speed
       correctly (e.g. running at 10x shows simulated time advancing 10x
       faster than the wall clock), not just time-since-Run-was-clicked. */
    #sim-time-display {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }
    #sim-time-display .label { color: var(--text-faint); margin-right: 4px; }
    #brand {
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #brand-logo {
      width: 22px;
      height: 22px;
    }
    .run-controls { display: flex; gap: 8px; }
    .run-toggle-btn, .reset-btn { font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 4px; height: 34px; }
    .run-toggle-btn .btn-icon, .reset-btn .btn-icon { font-size: 16px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
    .reset-btn .btn-icon { font-size: 20px; width: 20px; }
    .run-toggle-btn.state-idle, .run-toggle-btn.state-paused {
      color: var(--accent-green);
      background: rgba(61, 220, 132, 0.1);
    }
    .run-toggle-btn.state-idle:hover, .run-toggle-btn.state-paused:hover { background: rgba(61, 220, 132, 0.2); }
    .run-toggle-btn.state-running {
      color: var(--accent-orange);
      background: rgba(247, 169, 62, 0.1);
    }
    .run-toggle-btn.state-running:hover { background: rgba(247, 169, 62, 0.2); }
    .reset-btn {
      color: var(--accent-danger);
      background: rgba(239, 90, 111, 0.1);
    }
    .reset-btn:hover { background: rgba(239, 90, 111, 0.2); }

    #layout { display: flex; flex: 1 1 auto; min-height: 0; }
    /* Wraps just the canvas (not #controls too) so the attitude gizmo
       legend below can be positioned relative to the globe view alone,
       not the full #layout row (which would put "bottom-right" over the
       scenario/fault sidebar instead). */
    #scene-container { position: relative; flex: 1 1 0%; min-width: 0; display: flex; }
    #scene-canvas { flex: 1 1 auto; min-width: 0; display: block; background: radial-gradient(ellipse at 50% 40%, #0a0e1c 0%, var(--bg) 70%); }

    /* Attitude gizmo (renderer/attitude.ts): a fixed corner orientation
       indicator, not a 3D object at the spacecraft's world position (see
       that file's module doc for why). No background/border — this div
       is purely a geometry reference so main.ts knows where/how big to
       draw the WebGL triad underneath (see its use of
       getBoundingClientRect() on #attitude-gizmo-frame). */
    #attitude-gizmo-frame {
      position: absolute;
      right: 12px;
      bottom: 28px;
      width: 64px;
      height: 64px;
      pointer-events: none;
    }
    /* Disambiguates this from a generic camera-relative "nav gizmo"
       (Blender/Unity-style, rotates as you orbit) — this one is fixed
       regardless of camera and only changes with the satellite's real
       attitude, which is a meaningfully different thing to show and easy
       to mistake for the other if unlabeled. Sits at the actual bottom
       corner, below the gizmo itself (not above it). */
    #attitude-gizmo-caption {
      position: absolute;
      right: 12px;
      bottom: 12px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-faint);
      pointer-events: none;
    }
    /* X/Y/Z labels: repositioned every frame by main.ts to track each
       rotating axis's actual on-screen tip (computed via
       AttitudeGizmoRenderer.computeAxisTipsNdc()), not a static legend —
       initial left/top here don't matter, JS sets them immediately. */
    .axis-label {
      position: absolute;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
      transform: translate(-50%, -50%);
      text-shadow: 0 0 3px rgba(0, 0, 0, 0.9), 0 0 3px rgba(0, 0, 0, 0.9);
    }
    #axis-label-x { color: rgb(255, 64, 64); }
    #axis-label-y { color: rgb(77, 242, 77); }
    #axis-label-z { color: rgb(89, 140, 255); }

    /* Scenario editor + fault injection: moved into the narrow right
       sidebar (was the chart panels' spot) since these are low-density
       controls — a handful of sliders/toggles/buttons — that don't need
       much screen real estate, freeing the full-width strip below the
       globe for the charts that actually benefit from more room. */
    #controls {
      flex: 0 0 300px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      border-left: 1px solid var(--border);
      overflow-y: auto;
    }
    .control-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      flex: 0 0 auto;
    }

    /* Chart panels: moved out of the cramped 320px sidebar (where 4
       charts were squeezed into stacked rows ~70px tall) into a full-width
       strip below the globe, laid out side by side — far more horizontal
       resolution per chart, plus more vertical room to actually read
       trends/consistency bounds. */
    #panels {
      flex: 0 0 300px;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: 1fr;
      gap: 8px;
      padding: 8px;
      border-top: 1px solid var(--border);
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px 4px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      transition: border-color var(--transition);
    }
    .panel:hover { border-color: var(--border-strong); }
    .panel-title {
      margin: 0 0 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .panel-title .unit { font-weight: 400; text-transform: none; color: var(--text-faint); }
    .panel canvas { flex: 1 1 auto; min-height: 0; width: 100% !important; height: 100% !important; }
    /* Replaces the old static .panel-title — same visual weight (small,
       muted, uppercase-ish) but an actual control: each chart panel can
       show any metric (position/velocity error norm or X/Y/Z, attitude
       error, angular velocity error, covariance trace, NIS), not a fixed
       one (CLAUDE.md §12 — user-requested "choose which graphs to see"). */
    .panel-metric-select {
      margin: 0 0 4px;
      padding: 2px 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      align-self: flex-start;
      max-width: 100%;
    }
    .panel-metric-select:hover, .panel-metric-select:focus-visible {
      border-color: var(--border-strong);
      color: var(--text);
    }
    .control-card h3 {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .scenario-editor, .fault-panel { display: flex; flex-direction: column; gap: 8px; font-size: 13px; flex: 1 1 auto; }
    .scenario-editor .row { display: flex; align-items: center; gap: 8px; }
    .scenario-editor .row label { color: var(--text-muted); min-width: 64px; font-size: 12px; }
    /* The sidebar is much narrower now that scenario/fault controls live
       there instead of spanning the full bottom bar — without this, the
       satellite <select> sizes to its longest option text and overflows
       the sidebar's right edge instead of wrapping/eliding within it. */
    .scenario-editor .row select { flex: 1 1 auto; min-width: 0; }
    .fault-panel { flex-direction: row; flex-wrap: wrap; align-content: flex-start; }
    .fault-row { display: inline-flex; align-items: center; gap: 4px; }
    .fault-field { display: inline-flex; align-items: center; gap: 2px; }
    .fault-field-input {
      width: 56px;
      padding: 4px 5px;
      font-size: 12px;
      font-family: var(--font-mono);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
    }
    .fault-field-input:focus-visible { outline: 2px solid var(--accent-primary); outline-offset: 1px; }
    .fault-field-unit { font-size: 11px; color: var(--text-faint); }

    button {
      font-family: var(--font-ui);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }
    button:hover { background: #182038; border-color: var(--accent-primary); }
    button:active { transform: scale(0.97); }
    button:focus-visible { outline: 2px solid var(--accent-primary); outline-offset: 1px; }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    button:disabled:hover { background: var(--surface-2); border-color: var(--border-strong); }

    select, textarea, input[type='range'] {
      font-family: var(--font-ui);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
    }
    select, textarea { padding: 5px 8px; font-size: 12px; }
    textarea { resize: vertical; font-family: var(--font-mono); }
    select:focus-visible, textarea:focus-visible { outline: 2px solid var(--accent-primary); outline-offset: 1px; }

    /* Sim speed's typed-value input, paired with its range slider (see
       scenario_editor.ts) — narrow since it's just a number, not a dropdown. */
    .sim-speed-number {
      width: 56px;
      padding: 4px 6px;
      font-size: 12px;
      font-family: var(--font-mono);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      flex: 0 0 auto;
    }
    .sim-speed-number:focus-visible { outline: 2px solid var(--accent-primary); outline-offset: 1px; }

    /* GPS sigma's numeric input — no slider (request: typed value only). */
    .gps-sigma-number {
      width: 56px;
      padding: 4px 6px;
      font-size: 12px;
      font-family: var(--font-mono);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      flex: 0 0 auto;
    }
    .gps-sigma-number:focus-visible { outline: 2px solid var(--accent-primary); outline-offset: 1px; }

    /* "Run for" duration: number + unit select, empty input = unlimited. */
    .duration-number {
      width: 56px;
      padding: 4px 6px;
      font-size: 12px;
      font-family: var(--font-mono);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      flex: 0 0 auto;
    }
    .duration-number:focus-visible { outline: 2px solid var(--accent-primary); outline-offset: 1px; }
    /* Overrides ".scenario-editor .row select"'s flex:1 1 auto (meant for
       the satellite picker) — this select is a few characters, not a
       dropdown that should claim the row's remaining width. */
    .scenario-editor .row select.duration-unit { flex: 0 0 auto; min-width: 0; padding: 4px 6px; font-size: 12px; }

    /* "≈ 1 sim-day every Ns" caption under the Sim speed row (scenario_editor.ts's
       formatSimSpeedReadout) — a plain row's label gutter doesn't apply here, so
       its own minimal rule instead of reusing .scenario-editor .row. */
    .sim-speed-readout-row { padding-left: 0; margin-top: -2px; }
    .sim-speed-readout { font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); }

    /* Click-to-toggle "what does this mean" button for jargon/symbol
       labels (scenario_editor.ts's makeInfoButton) — not a native title=
       tooltip since the ask was specifically for something clickable. */
    .info-btn-wrapper { display: inline-flex; flex: 0 0 auto; }
    .info-btn {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text-faint);
      font-size: 10px;
      font-style: italic;
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transform: none;
    }
    .info-btn:hover, .info-btn:focus-visible { color: var(--text); border-color: var(--accent-primary); }
    .info-popover {
      position: fixed;
      z-index: 1000;
      width: 200px;
      padding: 8px 10px;
      font-size: 11px;
      line-height: 1.45;
      font-family: var(--font-ui);
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      color: var(--text-muted);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    }
    .info-popover-example {
      margin: 8px 0 0;
      padding: 6px 8px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      color: var(--text);
    }

    /* Paste-TLE textarea: the info button sits inside its own top-right
       corner instead of a separate label row above it. */
    .tle-section { position: relative; }
    .tle-section textarea { width: 225px; padding-right: 26px; }
    .tle-info-overlay { position: absolute; top: 6px; right: 6px; }

    input[type='range'] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: var(--border-strong);
      border: none;
      border-radius: 2px;
      flex: 1 1 auto;
      min-width: 0; /* override the UA's intrinsic min-width so it can actually shrink in a tight row (e.g. sim speed's slider + number input + unit) */
      cursor: pointer;
    }
    input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent-primary);
      box-shadow: 0 0 0 2px var(--bg);
      transition: transform var(--transition);
    }
    input[type='range']::-webkit-slider-thumb:hover { transform: scale(1.15); }
    input[type='range']::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent-primary);
      border: none;
    }

    /* J2/Drag/SRP: label + info button as siblings, not nested (see
       makeCheckbox's comment for why) — this wrapper keeps each pair
       visually together while .row's own gap separates the three fields. */
    /* Fixed equal width per field (sized for "Drag", the longest label) so
       J2/Drag/SRP form even columns — the row's gap alone is already a
       uniform 8px between fields, but letting each field's width track its
       own label text made the columns themselves uneven widths, which
       reads as uneven spacing even though the literal gap wasn't. */
    .checkbox-field { display: inline-flex; align-items: center; gap: 6px; width: 76px; }

    /* Theme native checkboxes to the app's accent color without rebuilding
       them as custom elements — accent-color recolors the checked state,
       color-scheme fixes the unchecked box from rendering as a stray
       light-theme square against this dark UI. Same native size/behavior/
       accessibility, just themed. */
    input[type='checkbox'] {
      accent-color: var(--accent-primary);
      color-scheme: dark;
    }

    .scenario-editor label:has(input[type='checkbox']) {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      font-size: 12px;
      min-width: 0;
    }

    .status-line { color: var(--text-faint); font-size: 11px; font-family: var(--font-mono); min-height: 14px; display: flex; align-items: center; gap: 6px; }
    .status-line.loading { color: var(--text-muted); }
    .status-line .spinner {
      width: 9px;
      height: 9px;
      border: 2px solid var(--border-strong);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      flex: 0 0 auto;
      animation: status-spin 0.7s linear infinite;
    }
    @keyframes status-spin { to { transform: rotate(360deg); } }

    /* Bottom-right toast notifications (ui/toast.ts) — used for errors
       that shouldn't sit in small inline status text easy to miss, e.g.
       a failed CelesTrak TLE fetch. */
    #toast-container {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
      pointer-events: none;
      max-width: 360px;
    }
    .toast {
      pointer-events: auto;
      padding: 10px 14px;
      border-radius: var(--radius);
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      color: var(--text);
      font-size: 12px;
      line-height: 1.4;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      animation: toast-in 160ms ease-out;
    }
    .toast-error { border-color: var(--accent-danger); background: rgba(239, 90, 111, 0.12); }
    .toast-success { border-color: var(--accent-green); background: rgba(61, 220, 132, 0.12); }
    .toast-info { border-color: var(--accent-primary); background: rgba(59, 130, 246, 0.12); }
    .toast-leaving { animation: toast-out 180ms ease-in forwards; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toast-out { to { opacity: 0; transform: translateY(8px); } }

    /* Monte Carlo panel: collapsed by default via a native <details>
       element — keyboard-accessible disclosure with no extra JS. */
    #mc-results-container { border-top: 1px solid var(--border); flex: 0 0 auto; }
    .mc-panel summary {
      cursor: pointer;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-muted);
      list-style: none;
    }
    .mc-panel summary::-webkit-details-marker { display: none; }
    .mc-panel summary::before { content: '▸ '; }
    .mc-panel[open] summary::before { content: '▾ '; }
    .mc-body { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
    /* Live "N / total realizations" readout — width set from JS each poll,
       not CSS-animated, since it must track the actual atomic counter
       (mc_progress_reader.ts), not a guessed duration. */
    .mc-progress-track {
      height: 4px;
      border-radius: 2px;
      background: var(--border-strong);
      overflow: hidden;
      margin-top: -4px;
    }
    .mc-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent-primary);
      transition: width 120ms linear;
    }
    .mc-charts-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; height: 200px; }
    .mc-charts-row .panel canvas { flex: 1 1 auto; min-height: 0; }
    .mc-rms-table { width: 100%; font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); border-collapse: collapse; }
    .mc-rms-table th, .mc-rms-table td { text-align: right; padding: 3px 6px; border-bottom: 1px solid var(--border); }
    .mc-rms-table th:first-child, .mc-rms-table td:first-child { text-align: left; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }

    @media (max-width: 900px) {
      /* Below this width, stop fitting the whole dashboard into one fixed
         100vh viewport (that's what squeezed the globe to ~95px tall in
         the first version of this breakpoint — #panels' fixed height left
         #scene-canvas only the leftover space) and let the page scroll
         instead: each section gets a sensible fixed/min height and the
         document grows normally. This is the more robust pattern for a
         data-dense dashboard on a small screen — verified by measuring
         getBoundingClientRect() for #layout/#panels/#controls/#scene-canvas
         at 700px width after the fix, not by eyeballing a screenshot. */
      html, body, #app { height: auto; min-height: 100%; }
      #layout { flex-direction: column; }
      #scene-canvas { min-height: 280px; flex: 0 0 280px; }
      #controls { flex-direction: row; flex-wrap: wrap; flex: 0 0 auto; border-left: none; border-top: 1px solid var(--border); }
      .control-card { flex: 1 1 260px; }
      /* 2x2 grid instead of 4 side-by-side columns — at this width, 4
         columns squeeze each chart too narrow to read. */
      #panels { flex: 0 0 360px; min-height: 0; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
      .mc-charts-row { grid-template-columns: repeat(2, 1fr); height: auto; }
      .mc-charts-row .panel { height: 200px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <div id="brand"><img id="brand-logo" src="/logo.png" alt="OrbitForge logo" />OrbitForge</div>
      <div id="sim-time-display"><span class="label">T+</span><span id="sim-time-value">00:00:00</span></div>
      <div id="run-controls-container"></div>
    </div>
    <div id="layout">
      <div id="scene-container">
        <canvas id="scene-canvas"></canvas>
        <span id="axis-label-x" class="axis-label">X</span>
